
{{- if .Values.httproute.create }}
{{- if eq .Values.httproute.type "traefik" }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cors-allow-all
spec:
  headers:
    accessControlAllowHeaders:
      - "*"
    accessControlAllowOriginList:
      - "*"
    accessControlMaxAge: 600
    addVaryHeader: true
    accessControlAllowMethods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
{{- end }}
{{- if eq .Values.httproute.type "nginx" }}
---
apiVersion: gateway.nginx.org/v1alpha1
kind: ClientSettingsPolicy
metadata:
  name: cors-policy
spec:
  allowOrigins:
  - "*"
  allowMethods:
  - GET
  - POST
  - PUT
  - OPTIONS
  - DELETE
  allowHeaders:
  - "*"
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oscar
spec:
{{- if ne .Values.ingress.host "" }}
  hostnames:
  - {{ .Values.httproute.host }}
{{- end }}
  parentRefs:
  - name: {{ .Values.httproute.gateway.name }}
    namespace: {{ .Values.httproute.gateway.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: ExtensionRef
      extensionRef:
{{- if eq .Values.httproute.type "traefik" }}
        group: traefik.io
        kind: Middleware
        name: cors-allow-all
{{- end }}
{{- if eq .Values.httproute.type "nginx" }}
        group: gateway.nginx.org
        kind: ClientSettingsPolicy
        name: cors-policy
{{- end }}
    backendRefs:
    - name: oscar
      port: {{ .Values.service.port }}
{{- end }}
