{{ if gt .Values.im.replicas 1.0 }}
---
apiVersion: v1
kind: Service
metadata:
  name: im-load-balancer-svc
{{- if  eq .Values.im.httproute.type "traefik" }}
  annotations:
    traefik.ingress.kubernetes.io/service.serverstransport: {{ .Release.Namespace }}-im-transport@kubernetescrd
{{- end }}
spec:
  ports:
  - name: http
    port: 80
  - name: stats
    port: 1936
  selector:
    run: haproxy-load-balancer
{{ end }}