---
{{ if  .Values.im.httproute.enabled }}
{{ if  eq .Values.im.httproute.type "nginx" }}
apiVersion: gateway.nginx.org/v1alpha1
kind: SnippetsFilter
metadata:
  name: im-snippets
  namespace: {{ .Release.Namespace }}
spec:
  snippets:
    - context: http.server.location
      value: |
        proxy_connect_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
        client_max_body_size 20m;
        client_body_buffer_size 64k;
{{- end }}
{{ if  eq .Values.im.httproute.type "traefik" }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: im-buffering
  namespace: {{ .Release.Namespace }}
spec:
  buffering:
    maxRequestBodyBytes: 20971520   # 20 MB
    memRequestBodyBytes: 65536      # 64 KB
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: im
spec:
  parentRefs:
  - name: {{ .Values.im.httproute.gateway.name }}
    namespace: {{ .Values.im.httproute.gateway.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: "{{ .Values.im.httproute.path }}"
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: "/"
{{ if  eq .Values.im.httproute.type "nginx" }}
    - type: ExtensionRef
      extensionRef:
        group: gateway.nginx.org
        kind: SnippetsFilter
        name: im-snippets
{{- end }}
{{ if  eq .Values.im.httproute.type "traefik" }}
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: im-buffering
{{- end }}
    backendRefs:
{{- if gt .Values.im.replicas 1.0 }}
    - name: im-load-balancer-svc
      port: 80
{{- else }}
    - name: im-backend
      port: 8800
{{- end }}
{{- end }}
